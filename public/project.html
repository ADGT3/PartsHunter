<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Sniper — Results</title>
<link rel="icon" href="/assets/mark.png?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css?v=8">
<script src="/assets/app.js?v=8" defer></script>
</head>
<body>
<header class="ps-header">
  <a class="ps-brand" href="/index.html">
    <img src="/assets/logo.png?v=6" alt="Parts Sniper" onerror="this.style.display='none'">
    <span class="ps-wordmark">PARTS <span>SNIPER</span></span>
  </a>
  <nav class="ps-nav">
    <a href="/index.html">Projects</a>
    <a href="/watchlist.html">Watchlist <span class="count" id="navSaved"></span></a>
    <a href="/alerts.html">Alerts</a>
  </nav>
  <div class="ps-spacer"></div>
  <button class="btn" onclick="location.href='/index.html'"><span class="plus">＋</span> New hunt</button>
  <div class="ps-avatar">PS</div>
</header>

<main class="ps-main">
  <div onclick="location.href='/index.html'" style="display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#9aa0a6;cursor:pointer;margin-bottom:20px">&#8592; All projects</div>

  <div style="display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:8px">
    <div>
      <div id="kicker" style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#ff6a3d;margin-bottom:10px">// 0 MATCHES</div>
      <h1 id="pName" style="font-family:Archivo,sans-serif;font-weight:800;font-size:34px;margin:0;letter-spacing:-.02em">Loading…</h1>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <div id="editBtn" style="display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;border:1px solid #2a2e34;color:#e9ebed;font-weight:600;font-size:13.5px;cursor:pointer">&#9998; Edit search</div>
      <div style="display:flex;align-items:center;gap:10px;padding:10px 15px;background:#131518;border:1px solid #23272c;border-radius:10px">
        <span style="width:7px;height:7px;border-radius:50%;background:#58c98a;animation:ps-pulse 2s ease infinite"></span>
        <span id="learnPill" style="font-size:13px;color:#c8cccf">Learning</span>
      </div>
    </div>
  </div>
  <div id="pGoal" class="muted" style="font-size:13.5px;max-width:640px;margin:2px 0 0"></div>

  <div id="catRow" style="display:none;align-items:center;flex-wrap:wrap;gap:8px;margin:22px 0 14px">
    <span style="font-size:12.5px;color:#6b7076;margin-right:2px">Category</span><span id="catChips"></span>
  </div>
  <div id="sortRow" style="display:none;align-items:center;flex-wrap:wrap;gap:10px;margin:0 0 22px">
    <span style="font-size:12.5px;color:#6b7076">Sort</span><span id="sortChips"></span>
    <div style="flex:1"></div>
    <span style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#6b7076">Rate results to sharpen the next run &#8594;</span>
  </div>

  <div id="results" style="display:flex;flex-direction:column;gap:12px"></div>
</main>

<footer style="border-top:1px solid #1a1d20;padding:22px 24px;text-align:center">
  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#4e5359;letter-spacing:.1em">PARTS SNIPER — PRECISION PART HUNTING</span>
</footer>

<script>
document.addEventListener('DOMContentLoaded', function () {
  const imgUrl = (u) => { if (!u) return ''; u = String(u).trim(); return u.slice(0,2) === '//' ? 'https:' + u : u.replace(/^http:\/\//i, 'https://'); };
  const id = PH.qs('id');
  if (!id) { document.getElementById('pName').textContent = 'Missing project id'; return; }
  PH.updateWatchCount();
  const $ = (i) => document.getElementById(i);
  let state = { project: null, listings: [], feedback: {}, category: 'All', sort: 'best' };
  const fbMap = (arr) => { const m = {}; (arr || []).forEach((f) => (m[f.listing_url] = f.vote)); return m; };

  $('editBtn').addEventListener('click', () => { location.href = 'draft.html?id=' + encodeURIComponent(id); });

  const scoreStyle = (sc) => "font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600;padding:3px 8px;border-radius:6px;flex-shrink:0;color:" +
    (sc >= 88 ? '#58c98a' : sc >= 70 ? '#e0a53c' : '#8b9096') + ";background:" + (sc >= 88 ? 'rgba(88,201,138,.14)' : sc >= 70 ? 'rgba(224,165,60,.14)' : 'rgba(139,144,150,.12)') + ";";
  const voteStyle = (on, kind) => {
    const base = "width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .12s;";
    if (on && kind === 'up') return base + "background:rgba(88,201,138,.16);border:1px solid #58c98a;color:#58c98a;";
    if (on && kind === 'down') return base + "background:rgba(255,90,44,.16);border:1px solid #ff5a2c;color:#ff6a3d;";
    return base + "background:#0f1113;border:1px solid #2a2e34;color:#6b7076;";
  };
  const saveStyle = (on) => "width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .12s;" +
    (on ? "background:rgba(255,90,44,.16);border:1px solid #ff5a2c;color:#ff6a3d;" : "background:#0f1113;border:1px solid #2a2e34;color:#6b7076;");
  const catChipStyle = (on) => "display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;" +
    (on ? "background:rgba(255,90,44,.13);border:1px solid #ff5a2c;color:#ffb59c;" : "background:transparent;border:1px solid #23272c;color:#8b9096;");
  const sortChipStyle = (on) => "display:inline-flex;padding:7px 13px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;" +
    (on ? "background:#1f2327;border:1px solid #3a4046;color:#e9ebed;" : "background:transparent;border:1px solid #23272c;color:#8b9096;");

  function baseScore(l) {
    let s = 72; const b = (l.badges || []).join(' ').toLowerCase();
    if (/oem|genuine/.test(b)) s += 10;
    if (/verified|in stock|available/.test(b)) s += 5;
    if (l.price_num != null) s += 4;
    if (l.image) s += 3;
    if (l.source === 'salvage') s += 2;
    return s;
  }
  function scoreOf(l) { let s = baseScore(l); const v = state.feedback[l.url] || 0; if (v > 0) s += 3; if (v < 0) s -= 4; return Math.max(5, Math.min(99, s)); }

  function snapCategory(l, cats) {
    const norm = (s) => (s || '').toLowerCase().replace(/[^a-z0-9]+/g, ' ').trim();
    const sec = norm(l.section);
    for (const c of cats) if (norm(c) === sec) return c;
    const stop = new Set(['and', 'the', 'for', 'with', 'parts', 'part', 'oem', 'system']);
    const words = (s) => norm(s).split(' ').filter((w) => w.length > 2 && !stop.has(w));
    const hay = words((l.section || '') + ' ' + (l.title || ''));
    let best = cats[0], bs = -1;
    for (const c of cats) { let sc = 0; for (const cw of words(c)) if (hay.some((h) => h === cw || (cw.length > 3 && (h.includes(cw) || cw.includes(h))))) sc++; if (sc > bs) { bs = sc; best = c; } }
    return best;
  }

  async function load() {
    try {
      const data = await PH.api('/api/project?id=' + encodeURIComponent(id));
      state.project = data.project; state.listings = data.listings || []; state.feedback = fbMap(data.feedback);
      $('pName').textContent = state.project.name; $('pGoal').textContent = state.project.goal;
      learn(); render();
    } catch (e) { $('results').innerHTML = '<div class="banner err">Could not load: ' + PH.esc(e.message) + '</div>'; }
  }
  function learn() {
    const n = Object.keys(state.feedback).length;
    $('learnPill').innerHTML = 'Learning — <span style="color:#58c98a;font-weight:600">' + n + ' signal' + (n === 1 ? '' : 's') + '</span> from your feedback';
  }
  function learn() { const n = Object.keys(state.feedback).length; $('learnPill').innerHTML = 'Learning — <span style="color:#58c98a;font-weight:600">' + n + ' signal' + (n === 1 ? '' : 's') + '</span> from your feedback'; }

  function render() {
    const c = state.project.config || {};
    $('kicker').textContent = '// ' + state.listings.length + ' MATCHES';
    const out = $('results');
    if (!state.listings.length) {
      $('catRow').style.display = 'none'; $('sortRow').style.display = 'none';
      out.innerHTML = '<div class="banner">No listings yet. Hit <b>Edit search</b> → <b>Update &amp; re-run</b>.</div>';
      return;
    }
    $('catRow').style.display = 'flex'; $('sortRow').style.display = 'flex';
    const defined = (c.categories || []).filter(Boolean);
    const useDefined = defined.length > 0;
    const cats = useDefined ? defined.slice() : [...new Set(state.listings.map((l) => l.section || 'Results'))];
    state.listings.forEach((l) => { l._cat = useDefined ? snapCategory(l, cats) : (l.section || 'Results'); });

    const counts = {}; state.listings.forEach((l) => { counts[l._cat] = (counts[l._cat] || 0) + 1; });
    $('catChips').innerHTML = ['All', ...cats].map((cat) => {
      const n = cat === 'All' ? state.listings.length : (counts[cat] || 0);
      return '<span class="jchip" data-cat="' + PH.esc(cat) + '" style="' + catChipStyle(state.category === cat) + '">' + PH.esc(cat) + ' <span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;opacity:.7">' + n + '</span></span>';
    }).join(' ');
    $('catChips').querySelectorAll('.jchip').forEach((el) => el.addEventListener('click', () => { state.category = el.dataset.cat; render(); }));

    const sorts = [['best', 'Best match'], ['new', 'Newest'], ['price', 'Lowest price']];
    $('sortChips').innerHTML = sorts.map((s) => '<span class="schip" data-s="' + s[0] + '" style="' + sortChipStyle(state.sort === s[0]) + '">' + s[1] + '</span>').join(' ');
    $('sortChips').querySelectorAll('.schip').forEach((el) => el.addEventListener('click', () => { state.sort = el.dataset.s; render(); }));

    let shown = state.listings.filter((l) => state.category === 'All' || l._cat === state.category);
    const pn = (l) => (l.price_num == null ? Infinity : Number(l.price_num));
    if (state.sort === 'best') shown = shown.slice().sort((a, b) => scoreOf(b) - scoreOf(a));
    else if (state.sort === 'new') shown = shown.slice().sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
    else if (state.sort === 'price') shown = shown.slice().sort((a, b) => pn(a) - pn(b));

    out.innerHTML = shown.map(rowHtml).join('') || '<div class="banner">Nothing in this category.</div>';
    wire();
  }

  function rowHtml(l) {
    const v = state.feedback[l.url] || 0, sc = scoreOf(l), saved = PH.watch.has(l.url);
    const rowStyle = "display:flex;align-items:center;flex-wrap:wrap;gap:16px;padding:16px;background:#131518;border:1px solid " +
      (v === 1 ? 'rgba(88,201,138,.4)' : v === -1 ? '#2a2e34' : '#23272c') + ";border-radius:14px;transition:border-color .15s;" + (v === -1 ? 'opacity:.55;' : '');
    const isrc = imgUrl(l.image);
    const thumb = isrc
      ? '<div style="width:108px;height:84px;border-radius:9px;flex-shrink:0;overflow:hidden;border:1px solid #24282d"><img src="' + PH.esc(isrc) + '" referrerpolicy="no-referrer" loading="lazy" onerror="this.parentElement.innerHTML=\'\'" style="width:100%;height:100%;object-fit:cover"></div>'
      : '<div style="width:108px;height:84px;border-radius:9px;flex-shrink:0;background-image:repeating-linear-gradient(135deg,#1b1e22 0 8px,#16181b 8px 16px);border:1px solid #24282d;display:flex;align-items:center;justify-content:center"><span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:#565b61;letter-spacing:.05em">part shot</span></div>';
    const pnBadge = (l.badges || []).find((b) => /^(pn|lot)\b/i.test(b) || /\d{3}/.test(b));
    const meta = [l.seller, l.condition, pnBadge].filter(Boolean).map((x) => PH.esc(x)).join(' &nbsp;·&nbsp; ');
    return '<div style="' + rowStyle + '" data-url="' + PH.esc(l.url) + '">' + thumb +
      '<div style="flex:1;min-width:190px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:6px">' +
        '<div style="' + scoreStyle(sc) + '">' + sc + '</div><h3 style="font-family:Archivo,sans-serif;font-weight:600;font-size:15.5px;margin:0;line-height:1.3">' + PH.esc(l.title) + '</h3></div>' +
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:#8b9096">' + (meta || '&nbsp;') + '</div></div>' +
      '<div style="display:flex;align-items:center;gap:16px;flex-shrink:0">' +
        '<div style="font-family:Archivo,sans-serif;font-weight:700;font-size:20px;white-space:nowrap"><a href="' + PH.esc(l.url) + '" target="_blank" rel="noopener" style="color:#e9ebed">' + PH.esc(PH.fmtPrice(l.price)) + '</a></div>' +
        '<div style="display:flex;gap:7px">' +
          '<div class="jsave" title="Save to watchlist" style="' + saveStyle(saved) + '">' + (saved ? '★' : '☆') + '</div>' +
          '<div class="jup" title="More like this" style="' + voteStyle(v === 1, 'up') + '">▲</div>' +
          '<div class="jdown" title="Less like this" style="' + voteStyle(v === -1, 'down') + '">▼</div>' +
        '</div></div></div>';
  }

  function wire() {
    $('results').querySelectorAll('[data-url]').forEach((row) => {
      const url = row.dataset.url, l = state.listings.find((x) => x.url === url);
      row.querySelector('.jup').addEventListener('click', () => vote(l, (state.feedback[url] > 0) ? 0 : 1));
      row.querySelector('.jdown').addEventListener('click', () => vote(l, (state.feedback[url] < 0) ? 0 : -1));
      row.querySelector('.jsave').addEventListener('click', () => {
        PH.watch.toggle({ url: l.url, title: l.title, price: l.price, seller: l.seller, image: l.image, section: l.section, projectId: id, projectName: state.project.name });
        PH.updateWatchCount(); render(); PH.toast(PH.watch.has(url) ? 'Saved to watchlist' : 'Removed from watchlist');
      });
    });
  }
  async function vote(l, value) {
    try {
      await PH.api('/api/feedback', { method: 'POST', body: { projectId: id, url: l.url, title: l.title, seller: l.seller, vote: value } });
      if (value === 0) delete state.feedback[l.url]; else state.feedback[l.url] = value;
      learn(); render();
    } catch (e) { PH.toast('Vote failed: ' + e.message); }
  }
  load();
});
</script>
</body>
</html>
