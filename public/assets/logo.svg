<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" width="640" height="200" role="img" aria-label="Parts Hunter">
  <defs>
    <linearGradient id="sil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.5" stop-color="#dfe3e8"/>
      <stop offset="1" stop-color="#8a93a0"/>
    </linearGradient>
    <linearGradient id="silw" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2f4f7"/>
      <stop offset="1" stop-color="#9aa3af"/>
    </linearGradient>
  </defs>

  <!-- motion dashes -->
  <g fill="#d5001c">
    <path d="M2 112 l22 0 -7 11 -22 0 Z"/>
    <path d="M10 128 l30 0 -7 11 -30 0 Z" opacity="0.8"/>
    <path d="M4 144 l18 0 -7 11 -18 0 Z" opacity="0.6"/>
  </g>

  <!-- car body (911-style fastback coupe) -->
  <path d="M40 138 C30 138 23 130 27 121 C34 103 78 99 104 98 L134 97
           C152 96 158 92 172 79 C182 69 198 59 222 59 C260 59 290 72 308 92
           C319 103 322 114 319 124 C317 130 312 135 303 136 L94 136 C60 136 48 140 40 138 Z"
        fill="url(#sil)" stroke="#6b7280" stroke-width="1"/>

  <!-- greenhouse / glass -->
  <path d="M150 93 C158 85 170 78 184 73 C200 67 216 65 233 68 C247 70 257 77 263 87 L176 93 Z"
        fill="#12151a"/>
  <!-- red side blade / character line -->
  <path d="M112 120 C162 116 244 116 300 120 L300 126 C244 122 162 122 112 127 Z" fill="#d5001c"/>
  <!-- red glass accent -->
  <path d="M236 70 C247 72 255 78 261 87 L250 88 C245 80 240 75 232 71 Z" fill="#d5001c"/>

  <!-- wheels -->
  <g>
    <circle cx="100" cy="134" r="23" fill="#15181d" stroke="#2a2f38" stroke-width="2"/>
    <circle cx="100" cy="134" r="12" fill="url(#silw)"/>
    <circle cx="100" cy="134" r="3.5" fill="#15181d"/>
    <circle cx="258" cy="134" r="23" fill="#15181d" stroke="#2a2f38" stroke-width="2"/>
    <circle cx="258" cy="134" r="12" fill="url(#silw)"/>
    <circle cx="258" cy="134" r="3.5" fill="#15181d"/>
  </g>

  <!-- ground speed bar -->
  <path d="M30 165 L250 165 L242 174 L22 174 Z" fill="#d5001c"/>
  <path d="M262 165 l40 0 -8 9 -40 0 Z" fill="#d5001c" opacity="0.7"/>

  <!-- wordmark -->
  <text x="338" y="100" font-family="'Arial Black','Arial Narrow',Arial,sans-serif" font-weight="900" font-style="italic" font-size="60" letter-spacing="1" fill="#d5001c">PARTS</text>
  <text x="338" y="158" font-family="'Arial Black','Arial Narrow',Arial,sans-serif" font-weight="900" font-style="italic" font-size="60" letter-spacing="1" fill="url(#silw)">HUNTER</text>
  <text x="342" y="182" font-family="Arial,Helvetica,sans-serif" font-weight="700" font-size="14" letter-spacing="6" fill="#9aa3af">OEM PARTS FINDER</text>
</svg>
