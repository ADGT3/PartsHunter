<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Sniper — Parts List</title>
<link rel="icon" href="/assets/mark.png?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css?v=8">
<script src="/assets/app.js?v=8" defer></script>
</head>
<body>
<header class="ps-header">
  <a class="ps-brand" href="/index.html">
    <img src="/assets/logo.png?v=6" alt="Parts Sniper" onerror="this.style.display='none'">
    <span class="ps-wordmark">PARTS <span>SNIPER</span></span>
  </a>
  <nav class="ps-nav">
    <a href="/index.html">Projects</a>
    <a href="/watchlist.html">Watchlist <span class="count" id="navSaved"></span></a>
    <a href="/alerts.html">Alerts</a>
  </nav>
  <div class="ps-spacer"></div>
  <button class="btn" onclick="location.href='/index.html'"><span class="plus">＋</span> New hunt</button>
  <div class="ps-avatar">PS</div>
</header>

<main class="ps-main">
  <div onclick="location.href='/index.html'" style="display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#9aa0a6;cursor:pointer;margin-bottom:20px">&#8592; All projects</div>
  <div id="kicker" style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#ff6a3d;margin-bottom:10px">// PARTS LIST HUNT</div>
  <h1 id="pName" style="font-family:Archivo,sans-serif;font-weight:800;font-size:34px;margin:0 0 22px;letter-spacing:-.02em">Loading…</h1>
  <div id="body"></div>
</main>

<footer style="border-top:1px solid #1a1d20;padding:22px 24px;text-align:center">
  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#4e5359;letter-spacing:.1em">PARTS SNIPER — PRECISION PART HUNTING</span>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async function () {
  PH.updateWatchCount();
  const id = PH.qs('id'), wantRun = PH.qs('run') === '1';
  const body = document.getElementById('body');
  const money = (n) => n == null ? '—' : '$' + Math.round(Number(n)).toLocaleString('en-AU');
  const STAT = { saving: { label: 'SAVING', color: '#58c98a', bg: 'rgba(88,201,138,.13)' }, nocheaper: { label: 'OEM BEST', color: '#8b9096', bg: 'rgba(139,144,150,.12)' }, notfound: { label: 'NO MATCH', color: '#e0a53c', bg: 'rgba(224,165,60,.13)' } };
  const KIND = { oem: 'OEM', aftermarket: 'AFTERMKT', salvage: 'SALVAGE' };
  const voteStyle = (on, kind) => { const b = "width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .12s;"; if (on && kind === 'up') return b + "background:rgba(88,201,138,.16);border:1px solid #58c98a;color:#58c98a;"; if (on && kind === 'down') return b + "background:rgba(255,90,44,.16);border:1px solid #ff5a2c;color:#ff6a3d;"; return b + "background:#0f1113;border:1px solid #2a2e34;color:#6b7076;"; };
  const saveStyle = (on) => "width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .12s;" + (on ? "background:rgba(255,90,44,.16);border:1px solid #ff5a2c;color:#ff6a3d;" : "background:#0f1113;border:1px solid #2a2e34;color:#6b7076;");
  const badge = (label, color, bg) => "font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.06em;padding:3px 8px;border-radius:6px;flex-shrink:0;color:" + color + ";background:" + bg + ";";
  let data = null, sfilter = 'all', kfilter = 'all', open = {}, feedback = {};
  const fbMap = (arr) => { const m = {}; (arr || []).forEach((f) => (m[f.listing_url] = f.vote)); return m; };
  // a stable key for save/vote — the source URL, or a synthetic key when the search returned no URL
  const keyOf = (p, a) => a.url || ('psrc:' + (p.pn || p.id) + ':' + (a.label || ''));

  async function loadData() { data = await PH.api('/api/list?id=' + encodeURIComponent(id)); feedback = fbMap(data.feedback); }
  async function runHunt() {
    body.innerHTML = '<div class="banner"><span class="spinner"></span> Hunting the cheapest source for every part — this can take a couple of minutes. Leave this open.</div>';
    try { await PH.api('/api/run-list', { method: 'POST', body: { projectId: id } }); await loadData(); render(); }
    catch (e) { body.innerHTML = '<div class="banner err">Hunt failed: ' + PH.esc(e.message) + '</div>'; }
  }
  function chip(kind, val, cur, label, n) {
    const on = cur === val;
    const style = 'display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;' + (on ? 'background:rgba(255,90,44,.13);border:1px solid #ff5a2c;color:#ffb59c;' : 'background:transparent;border:1px solid #23272c;color:#8b9096;');
    return '<span class="' + kind + 'chip" data-v="' + val + '" style="' + style + '">' + label + (n != null ? ' <span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;opacity:.7">' + n + '</span>' : '') + '</span>';
  }

  // A source found, rendered as a full listing card (same style as search Results).
  function sourceCard(p, a) {
    const url = a.url, key = keyOf(p, a), v = feedback[key] || 0, saved = PH.watch.has(key);
    const bLabel = a.best ? 'BEST' : (KIND[a.kind] || 'ALT');
    const bStyle = a.best ? badge('BEST', '#58c98a', 'rgba(88,201,138,.13)') : badge(bLabel, '#8b9096', 'rgba(139,144,150,.12)');
    const rowStyle = "display:flex;align-items:center;flex-wrap:wrap;gap:16px;padding:14px 16px;text-decoration:none;color:inherit;background:#16181b;border:1px solid " + (a.best ? 'rgba(88,201,138,.4)' : '#24282d') + ";border-radius:12px;" + (url ? 'cursor:pointer;' : '');
    const thumb = '<div style="width:96px;height:74px;border-radius:9px;flex-shrink:0;background-image:repeating-linear-gradient(135deg,#1b1e22 0 8px,#16181b 8px 16px);border:1px solid #24282d;display:flex;align-items:center;justify-content:center"><span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:#565b61;letter-spacing:.05em">part shot</span></div>';
    const inner = thumb +
      '<div style="flex:1;min-width:190px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:5px"><span style="' + bStyle + '">' + bLabel + '</span>' +
        '<h3 style="font-family:Archivo,sans-serif;font-weight:600;font-size:15px;margin:0;line-height:1.3">' + PH.esc(a.label) + '</h3></div>' +
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:#8b9096">' + PH.esc(p.desc || '') + ' &nbsp;·&nbsp; PN ' + PH.esc(p.pn || '—') + (url ? '' : ' &nbsp;·&nbsp; no link') + '</div></div>' +
      '<div style="display:flex;align-items:center;gap:14px;flex-shrink:0" data-nolink>' +
        '<div style="font-family:Archivo,sans-serif;font-weight:700;font-size:19px;white-space:nowrap;color:' + (a.best ? '#58c98a' : '#e9ebed') + '">' + money(a.price) + '</div>' +
        '<div style="display:flex;gap:7px" data-key="' + PH.esc(key) + '" data-url="' + PH.esc(url || '') + '">' +
          '<div class="jsave" title="Save to watchlist" style="' + saveStyle(saved) + '">' + (saved ? '★' : '☆') + '</div>' +
          '<div class="jup" title="Good source" style="' + voteStyle(v === 1, 'up') + '">▲</div>' +
          '<div class="jdown" title="Bad source" style="' + voteStyle(v === -1, 'down') + '">▼</div>' +
        '</div></div>';
    return url ? '<a href="' + PH.esc(url) + '" target="_blank" rel="noopener" style="' + rowStyle + '">' + inner + '</a>' : '<div style="' + rowStyle + '">' + inner + '</div>';
  }

  // The part row (original format) + expandable Sources Found.
  function rowHtml(p) {
    const st = STAT[p.status], isOpen = !!open[p.id];
    const pct = p.status === 'saving' && p.est ? Math.round(p.saving / p.est * 100) : 0;
    const foundStyle = 'font-family:Archivo,sans-serif;font-weight:700;font-size:20px;white-space:nowrap;color:' + (p.status === 'saving' ? '#58c98a' : '#e9ebed');
    const saveLabel = p.status === 'saving' ? '−' + money(p.saving) + ' · ' + pct + '%' : (p.status === 'nocheaper' ? 'OEM best' : 'Not found');
    const matchLabel = p.matches > 0 ? p.matches + (p.matches === 1 ? ' source' : ' sources') : '—';
    const wrapBorder = p.status === 'saving' ? 'rgba(88,201,138,.4)' : '#23272c';
    const parent =
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:16px;padding:16px 17px">' +
        '<div style="flex:1;min-width:200px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:5px"><span style="' + badge(st.label, st.color, st.bg) + '">' + st.label + '</span>' +
          '<h3 style="font-family:Archivo,sans-serif;font-weight:600;font-size:15px;margin:0;line-height:1.3">' + PH.esc(p.desc || '') + '</h3></div>' +
          '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:#8b9096">PN ' + PH.esc(p.pn || '—') + ' &nbsp;·&nbsp; qty ' + (p.qty != null ? p.qty : '—') + ' &nbsp;·&nbsp; ' + matchLabel + '</div></div>' +
        '<div style="text-align:right"><div style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;color:#6b7076;letter-spacing:.06em">ESTIMATE</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:14px;color:#9aa0a6;text-decoration:line-through">' + money(p.est) + '</div></div>' +
        '<div style="width:22px;text-align:center;color:#4e5359">→</div>' +
        '<div style="text-align:right;min-width:96px"><div style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;color:#6b7076;letter-spacing:.06em">BEST FOUND</div><div style="' + foundStyle + '">' + (p.found != null ? money(p.found) : '—') + '</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:600;color:' + st.color + '">' + saveLabel + '</div></div>' +
        (p.matches > 0 ? '<div class="chev" style="width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;background:#0f1113;border:1px solid #2a2e34;color:#8b9096;flex-shrink:0">' + (isOpen ? '▲' : '▼') + '</div>' : '<div style="width:34px"></div>') +
      '</div>';
    const cards = (p.alts || []).map((a) => sourceCard(p, a)).join('');
    const expand = (isOpen && cards) ? '<div style="border-top:1px solid #22262b;padding:14px 17px 16px"><div style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;letter-spacing:.08em;color:#6b7076;margin:0 0 10px">SOURCES FOUND</div><div style="display:flex;flex-direction:column;gap:10px">' + cards + '</div></div>' : '';
    return '<div data-id="' + PH.esc(p.id) + '" style="background:#131518;border:1px solid ' + wrapBorder + ';border-radius:14px;overflow:hidden">' + parent + expand + '</div>';
  }

  function render() {
    document.getElementById('pName').textContent = data.project.name;
    const parts = data.results || data.partsList || [];
    document.getElementById('kicker').textContent = '// PARTS LIST HUNT — ' + parts.length + ' LINES';
    if (!data.results) {
      body.innerHTML = '<div class="banner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap"><span>' + (data.partsList || []).length + ' parts ready to hunt.</span><button class="btn" id="runBtn">Hunt all ' + (data.partsList || []).length + ' parts &#8594;</button></div>';
      document.getElementById('runBtn').addEventListener('click', runHunt); return;
    }
    const t = data.totals || { estTotal: 0, foundTotal: 0, saveTotal: 0 };
    const pct = t.estTotal ? Math.round(t.saveTotal / t.estTotal * 100) : 0, r = data.results;
    const sc = { all: r.length, saving: r.filter((x) => x.status === 'saving').length, nocheaper: r.filter((x) => x.status === 'nocheaper').length, notfound: r.filter((x) => x.status === 'notfound').length };
    const kc = { all: r.length, oem: r.filter((x) => x.kind === 'oem').length, aftermarket: r.filter((x) => x.kind === 'aftermarket').length, salvage: r.filter((x) => x.kind === 'salvage').length };
    body.innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px">' +
        '<div style="padding:18px 20px;border:1px solid #22262b;border-radius:13px;background:#131518"><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.1em;color:#6b7076;margin-bottom:8px">ESTIMATE TOTAL</div><div style="font-family:Archivo,sans-serif;font-weight:700;font-size:27px">' + money(t.estTotal) + '</div></div>' +
        '<div style="padding:18px 20px;border:1px solid #22262b;border-radius:13px;background:#131518"><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.1em;color:#6b7076;margin-bottom:8px">BEST-FOUND TOTAL</div><div style="font-family:Archivo,sans-serif;font-weight:700;font-size:27px">' + money(t.foundTotal) + '</div></div>' +
        '<div style="padding:18px 20px;border:1px solid rgba(88,201,138,.35);border-radius:13px;background:linear-gradient(120deg,rgba(88,201,138,.12),rgba(88,201,138,.02))"><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.1em;color:#58c98a;margin-bottom:8px">POTENTIAL SAVING</div><div style="display:flex;align-items:baseline;gap:9px"><div style="font-family:Archivo,sans-serif;font-weight:800;font-size:27px;color:#58c98a">' + money(t.saveTotal) + '</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:13px;color:#58c98a">−' + pct + '%</div></div></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:10px"><span style="font-size:12.5px;color:#6b7076;margin-right:2px">Status</span><span id="schips">' + chip('s', 'all', sfilter, 'All', sc.all) + chip('s', 'saving', sfilter, 'Savings', sc.saving) + chip('s', 'nocheaper', sfilter, 'OEM best', sc.nocheaper) + chip('s', 'notfound', sfilter, 'No match', sc.notfound) + '</span></div>' +
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:20px"><span style="font-size:12.5px;color:#6b7076;margin-right:2px">Source</span><span id="kchips">' + chip('k', 'all', kfilter, 'All', kc.all) + chip('k', 'oem', kfilter, 'OEM', kc.oem) + chip('k', 'aftermarket', kfilter, 'Aftermarket', kc.aftermarket) + chip('k', 'salvage', kfilter, 'Salvage', kc.salvage) + '</span></div>' +
      '<div id="rows" style="display:flex;flex-direction:column;gap:12px"></div>';
    document.querySelectorAll('#schips .schip').forEach((el) => el.addEventListener('click', () => { sfilter = el.dataset.v; render(); }));
    document.querySelectorAll('#kchips .kchip').forEach((el) => el.addEventListener('click', () => { kfilter = el.dataset.v; render(); }));
    drawRows();
  }

  function drawRows() {
    const shown = data.results.filter((p) => (sfilter === 'all' || p.status === sfilter) && (kfilter === 'all' || p.kind === kfilter));
    const el = document.getElementById('rows');
    el.innerHTML = shown.map(rowHtml).join('') || '<div class="banner">Nothing in this filter.</div>';
    el.querySelectorAll('[data-id]').forEach((wrap) => {
      const p = data.results.find((x) => x.id === wrap.dataset.id);
      const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
      const chev = wrap.querySelector('.chev'); if (chev) chev.addEventListener('click', (e) => { stop(e); open[p.id] = !open[p.id]; drawRows(); });
      wrap.querySelectorAll('[data-key]').forEach((box) => {
        const key = box.dataset.key, url = box.dataset.url;
        const alt = (p.alts || []).find((a) => (a.url || ('psrc:' + (p.pn || p.id) + ':' + (a.label || ''))) === key);
        const up = box.querySelector('.jup'), down = box.querySelector('.jdown'), sv = box.querySelector('.jsave');
        if (up) up.addEventListener('click', (e) => { stop(e); voteSrc(p, key, (feedback[key] > 0) ? 0 : 1); });
        if (down) down.addEventListener('click', (e) => { stop(e); voteSrc(p, key, (feedback[key] < 0) ? 0 : -1); });
        if (sv) sv.addEventListener('click', (e) => { stop(e); PH.watch.toggle({ url: url || key, title: (alt ? alt.label + ' — ' : '') + (p.desc || ''), price: alt ? alt.price : null, seller: alt ? alt.label : '', section: 'Parts list', projectId: id, projectName: data.project.name }); PH.updateWatchCount(); drawRows(); PH.toast(PH.watch.has(key) ? 'Saved to watchlist' : 'Removed from watchlist'); });
      });
    });
  }
  async function voteSrc(p, key, value) {
    try {
      await PH.api('/api/feedback', { method: 'POST', body: { projectId: id, url: key, title: p ? p.desc : '', vote: value } });
      if (value === 0) delete feedback[key]; else feedback[key] = value;
      drawRows();
    } catch (e) { PH.toast('Vote failed: ' + e.message); }
  }

  try { await loadData(); if (wantRun && !data.results) { render(); runHunt(); } else render(); }
  catch (e) { body.innerHTML = '<div class="banner err">Could not load: ' + PH.esc(e.message) + '</div>'; }
});
</script>
</body>
</html>
