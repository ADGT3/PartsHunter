<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Sniper — Parts List</title>
<link rel="icon" href="/assets/mark.png?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css?v=8">
<script src="/assets/app.js?v=8" defer></script>
</head>
<body>
<header class="ps-header">
  <a class="ps-brand" href="/index.html">
    <img src="/assets/logo.png?v=6" alt="Parts Sniper" onerror="this.style.display='none'">
    <span class="ps-wordmark">PARTS <span>SNIPER</span></span>
  </a>
  <nav class="ps-nav">
    <a href="/index.html">Projects</a>
    <a href="/watchlist.html">Watchlist <span class="count" id="navSaved"></span></a>
    <a href="/alerts.html">Alerts</a>
  </nav>
  <div class="ps-spacer"></div>
  <button class="btn" onclick="location.href='/index.html'"><span class="plus">＋</span> New hunt</button>
  <div class="ps-avatar">PS</div>
</header>

<main class="ps-main">
  <div onclick="location.href='/index.html'" style="display:inline-flex;align-items:center;gap:7px;font-size:13px;color:#9aa0a6;cursor:pointer;margin-bottom:20px">&#8592; All projects</div>
  <div id="kicker" style="font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.2em;color:#ff6a3d;margin-bottom:10px">// PARTS LIST HUNT</div>
  <h1 id="pName" style="font-family:Archivo,sans-serif;font-weight:800;font-size:34px;margin:0 0 22px;letter-spacing:-.02em">Loading…</h1>
  <div id="body"></div>
</main>

<footer style="border-top:1px solid #1a1d20;padding:22px 24px;text-align:center">
  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#4e5359;letter-spacing:.1em">PARTS SNIPER — PRECISION PART HUNTING</span>
</footer>

<script>
document.addEventListener('DOMContentLoaded', async function () {
  PH.updateWatchCount();
  const id = PH.qs('id'), wantRun = PH.qs('run') === '1';
  const body = document.getElementById('body');
  const money = (n) => n == null ? '—' : '$' + Math.round(Number(n)).toLocaleString('en-AU');
  const META = { saving: { label: 'SAVING', color: '#58c98a', bg: 'rgba(88,201,138,.13)' }, nocheaper: { label: 'OEM BEST', color: '#8b9096', bg: 'rgba(139,144,150,.12)' }, notfound: { label: 'NO MATCH', color: '#e0a53c', bg: 'rgba(224,165,60,.13)' } };
  const voteStyle = (on, kind) => { const b = "width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:all .12s;"; if (on && kind === 'up') return b + "background:rgba(88,201,138,.16);border:1px solid #58c98a;color:#58c98a;"; if (on && kind === 'down') return b + "background:rgba(255,90,44,.16);border:1px solid #ff5a2c;color:#ff6a3d;"; return b + "background:#0f1113;border:1px solid #2a2e34;color:#6b7076;"; };
  const saveStyle = (on) => "width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:all .12s;" + (on ? "background:rgba(255,90,44,.16);border:1px solid #ff5a2c;color:#ff6a3d;" : "background:#0f1113;border:1px solid #2a2e34;color:#6b7076;");
  const badgeStyle = (m) => "font-family:'JetBrains Mono',monospace;font-size:10px;font-weight:600;letter-spacing:.06em;padding:3px 8px;border-radius:6px;flex-shrink:0;color:" + m.color + ";background:" + m.bg + ";";
  let data = null, filter = 'all', open = {}, feedback = {};
  const fbMap = (arr) => { const m = {}; (arr || []).forEach((f) => (m[f.listing_url] = f.vote)); return m; };

  async function loadData() { data = await PH.api('/api/list?id=' + encodeURIComponent(id)); feedback = fbMap(data.feedback); }
  async function runHunt() {
    body.innerHTML = '<div class="banner"><span class="spinner"></span> Hunting the cheapest source for every part — this can take a couple of minutes. Leave this open.</div>';
    try { await PH.api('/api/run-list', { method: 'POST', body: { projectId: id } }); await loadData(); render(); }
    catch (e) { body.innerHTML = '<div class="banner err">Hunt failed: ' + PH.esc(e.message) + '</div>'; }
  }
  function chip(f, label, n) {
    const on = filter === f;
    const style = 'display:inline-flex;align-items:center;gap:7px;padding:7px 13px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;' + (on ? 'background:rgba(255,90,44,.13);border:1px solid #ff5a2c;color:#ffb59c;' : 'background:transparent;border:1px solid #23272c;color:#8b9096;');
    return '<span class="fchip" data-f="' + f + '" style="' + style + '">' + label + ' <span style="font-family:\'JetBrains Mono\',monospace;font-size:11px;opacity:.7">' + n + '</span></span>';
  }

  // Each found part rendered as a listing-card row (same style as search Results).
  function rowHtml(p) {
    const m = META[p.status], isOpen = !!open[p.id];
    const pct = p.status === 'saving' && p.est ? Math.round(p.saving / p.est * 100) : 0;
    const v = feedback[p.url] || 0, saved = p.url && PH.watch.has(p.url);
    const rowStyle = "display:flex;align-items:center;flex-wrap:wrap;gap:16px;padding:16px;text-decoration:none;color:inherit;background:#131518;border:1px solid " +
      (p.status === 'saving' ? 'rgba(88,201,138,.4)' : '#23272c') + ";border-radius:14px;transition:border-color .15s;" + (p.url ? 'cursor:pointer;' : '');
    const thumb = '<div style="width:108px;height:84px;border-radius:9px;flex-shrink:0;background-image:repeating-linear-gradient(135deg,#1b1e22 0 8px,#16181b 8px 16px);border:1px solid #24282d;display:flex;align-items:center;justify-content:center"><span style="font-family:\'JetBrains Mono\',monospace;font-size:9px;color:#565b61;letter-spacing:.05em">part shot</span></div>';
    const matchLabel = p.matches > 0 ? p.matches + (p.matches === 1 ? ' source' : ' sources') : '—';
    const meta = 'PN ' + PH.esc(p.pn || '—') + ' &nbsp;·&nbsp; qty ' + (p.qty != null ? p.qty : '—') + (p.source ? ' &nbsp;·&nbsp; ' + PH.esc(p.source) + (p.location ? ' (' + PH.esc(p.location) + ')' : '') : '') + ' &nbsp;·&nbsp; ' + matchLabel;
    // price + savings block
    const priceMain = p.found != null ? money(p.found) : (p.est != null ? money(p.est) : '—');
    const priceColor = p.status === 'saving' ? '#58c98a' : '#e9ebed';
    const sub = p.status === 'saving' ? ('<span style="text-decoration:line-through">' + money(p.est) + '</span> · <span style="color:#58c98a">−' + money(p.saving) + ' · ' + pct + '%</span>')
      : (p.status === 'nocheaper' ? 'OEM best price' : (p.est != null ? '<span style="text-decoration:line-through">' + money(p.est) + '</span> · not found' : 'not found'));
    const actions = '<div style="display:flex;gap:7px;flex-shrink:0" data-nolink>' +
      (p.url ? '<div class="jsave" title="Save to watchlist" style="' + saveStyle(saved) + '">' + (saved ? '★' : '☆') + '</div><div class="jup" title="Good source" style="' + voteStyle(v === 1, 'up') + '">▲</div><div class="jdown" title="Bad source" style="' + voteStyle(v === -1, 'down') + '">▼</div>' : '') +
      (p.matches > 0 ? '<div class="chev" title="Sources" style="width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;background:#0f1113;border:1px solid #2a2e34;color:#8b9096">' + (isOpen ? '▲' : '▼') + '</div>' : '') +
      '</div>';
    const inner = thumb +
      '<div style="flex:1;min-width:190px"><div style="display:flex;align-items:center;gap:9px;margin-bottom:6px"><span style="' + badgeStyle(m) + '">' + m.label + '</span>' +
        '<h3 style="font-family:Archivo,sans-serif;font-weight:600;font-size:15.5px;margin:0;line-height:1.3">' + PH.esc(p.desc || '') + '</h3></div>' +
        '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11.5px;color:#8b9096">' + meta + '</div></div>' +
      '<div style="display:flex;align-items:center;gap:16px;flex-shrink:0">' +
        '<div style="text-align:right"><div style="font-family:Archivo,sans-serif;font-weight:700;font-size:20px;white-space:nowrap;color:' + priceColor + '">' + priceMain + '</div>' +
          '<div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;color:#8b9096;margin-top:2px;white-space:nowrap">' + sub + '</div></div>' +
        actions + '</div>';
    const alts = (p.alts || []).map((a) => {
      const line = '<span style="font-family:\'JetBrains Mono\',monospace;font-size:12.5px;color:#d7dbde">' + PH.esc(a.label) + (a.url ? ' ↗' : '') + '</span><div style="display:flex;align-items:center;gap:10px"><span style="font-family:Archivo,sans-serif;font-weight:700;font-size:14px">' + money(a.price) + '</span>' + (a.best ? '<span style="font-family:\'JetBrains Mono\',monospace;font-size:10px;font-weight:600;color:#0d0e10;background:#58c98a;padding:3px 7px;border-radius:5px">BEST</span>' : '') + '</div>';
      const box = 'display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 13px;background:#0f1113;border:1px solid #24282d;border-radius:9px;';
      return a.url ? '<a href="' + PH.esc(a.url) + '" target="_blank" rel="noopener" style="text-decoration:none;' + box + '">' + line + '</a>' : '<div style="' + box + '">' + line + '</div>';
    }).join('');
    const card = p.url ? '<a href="' + PH.esc(p.url) + '" target="_blank" rel="noopener" style="' + rowStyle + '">' + inner + '</a>' : '<div style="' + rowStyle + '">' + inner + '</div>';
    return '<div data-id="' + PH.esc(p.id) + '">' + card +
      (isOpen && alts ? '<div style="border:1px solid #22262b;border-top:0;border-radius:0 0 13px 13px;margin-top:-6px;padding:12px 16px 14px"><div style="font-family:\'JetBrains Mono\',monospace;font-size:10.5px;letter-spacing:.08em;color:#6b7076;margin:0 0 8px">SOURCES FOUND</div><div style="display:flex;flex-direction:column;gap:7px">' + alts + '</div></div>' : '') +
      '</div>';
  }

  function render() {
    document.getElementById('pName').textContent = data.project.name;
    const parts = data.results || data.partsList || [];
    document.getElementById('kicker').textContent = '// PARTS LIST HUNT — ' + parts.length + ' LINES';
    if (!data.results) {
      body.innerHTML = '<div class="banner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap"><span>' + (data.partsList || []).length + ' parts ready to hunt.</span><button class="btn" id="runBtn">Hunt all ' + (data.partsList || []).length + ' parts &#8594;</button></div>';
      document.getElementById('runBtn').addEventListener('click', runHunt); return;
    }
    const t = data.totals || { estTotal: 0, foundTotal: 0, saveTotal: 0 };
    const pct = t.estTotal ? Math.round(t.saveTotal / t.estTotal * 100) : 0, r = data.results;
    const c = { all: r.length, saving: r.filter((x) => x.status === 'saving').length, nocheaper: r.filter((x) => x.status === 'nocheaper').length, notfound: r.filter((x) => x.status === 'notfound').length };
    body.innerHTML =
      '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:26px">' +
        '<div style="padding:18px 20px;border:1px solid #22262b;border-radius:13px;background:#131518"><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.1em;color:#6b7076;margin-bottom:8px">ESTIMATE TOTAL</div><div style="font-family:Archivo,sans-serif;font-weight:700;font-size:27px">' + money(t.estTotal) + '</div></div>' +
        '<div style="padding:18px 20px;border:1px solid #22262b;border-radius:13px;background:#131518"><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.1em;color:#6b7076;margin-bottom:8px">BEST-FOUND TOTAL</div><div style="font-family:Archivo,sans-serif;font-weight:700;font-size:27px">' + money(t.foundTotal) + '</div></div>' +
        '<div style="padding:18px 20px;border:1px solid rgba(88,201,138,.35);border-radius:13px;background:linear-gradient(120deg,rgba(88,201,138,.12),rgba(88,201,138,.02))"><div style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:.1em;color:#58c98a;margin-bottom:8px">POTENTIAL SAVING</div><div style="display:flex;align-items:baseline;gap:9px"><div style="font-family:Archivo,sans-serif;font-weight:800;font-size:27px;color:#58c98a">' + money(t.saveTotal) + '</div><div style="font-family:\'JetBrains Mono\',monospace;font-size:13px;color:#58c98a">−' + pct + '%</div></div></div>' +
      '</div>' +
      '<div style="display:flex;align-items:center;flex-wrap:wrap;gap:8px;margin-bottom:16px"><span style="font-size:12.5px;color:#6b7076;margin-right:2px">Filter</span><span id="fchips">' + chip('all', 'All', c.all) + chip('saving', 'Savings found', c.saving) + chip('nocheaper', 'OEM best price', c.nocheaper) + chip('notfound', 'No match', c.notfound) + '</span></div>' +
      '<div id="rows" style="display:flex;flex-direction:column;gap:12px"></div>';
    document.querySelectorAll('#fchips .fchip').forEach((el) => el.addEventListener('click', () => { filter = el.dataset.f; render(); }));
    drawRows();
  }

  function drawRows() {
    const shown = data.results.filter((p) => filter === 'all' || p.status === filter);
    const el = document.getElementById('rows');
    el.innerHTML = shown.map(rowHtml).join('') || '<div class="banner">Nothing in this filter.</div>';
    el.querySelectorAll('[data-id]').forEach((wrap) => {
      const p = data.results.find((x) => x.id === wrap.dataset.id);
      const stop = (e) => { e.preventDefault(); e.stopPropagation(); };
      const chev = wrap.querySelector('.chev'); if (chev) chev.addEventListener('click', (e) => { stop(e); open[p.id] = !open[p.id]; drawRows(); });
      const up = wrap.querySelector('.jup'), down = wrap.querySelector('.jdown'), sv = wrap.querySelector('.jsave');
      if (up) up.addEventListener('click', (e) => { stop(e); voteLine(p, (feedback[p.url] > 0) ? 0 : 1); });
      if (down) down.addEventListener('click', (e) => { stop(e); voteLine(p, (feedback[p.url] < 0) ? 0 : -1); });
      if (sv) sv.addEventListener('click', (e) => { stop(e); PH.watch.toggle({ url: p.url, title: p.desc, price: p.found, seller: p.source || '', section: 'Parts list', projectId: id, projectName: data.project.name }); PH.updateWatchCount(); drawRows(); PH.toast(PH.watch.has(p.url) ? 'Saved to watchlist' : 'Removed from watchlist'); });
    });
  }
  async function voteLine(p, value) {
    if (!p.url) return;
    try {
      await PH.api('/api/feedback', { method: 'POST', body: { projectId: id, url: p.url, title: p.desc, seller: p.source || '', vote: value } });
      if (value === 0) delete feedback[p.url]; else feedback[p.url] = value;
      drawRows();
    } catch (e) { PH.toast('Vote failed: ' + e.message); }
  }

  try { await loadData(); if (wantRun && !data.results) { render(); runHunt(); } else render(); }
  catch (e) { body.innerHTML = '<div class="banner err">Could not load: ' + PH.esc(e.message) + '</div>'; }
});
</script>
</body>
</html>
