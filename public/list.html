<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Parts Sniper — Parts List</title>
<link rel="icon" href="/assets/mark.png?v=6">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/app.css?v=8">
<script src="/assets/app.js?v=8" defer></script>
<style>
  .sumgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin: 24px 0 26px; }
  .sum { padding: 18px 20px; border: 1px solid var(--line); border-radius: 14px; background: var(--panel); }
  .sum.save { border-color: #2e6a45; background: #12201a; }
  .sum .k { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; color: var(--dim); margin-bottom: 8px; }
  .sum .v { font-family: var(--head); font-weight: 800; font-size: 28px; letter-spacing: -.01em; }
  .sum.save .v { color: #58c98a; }
  .sum .pct { font-family: var(--mono); font-size: 12px; color: #58c98a; margin-left: 8px; }
  .fchips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 18px; }
  .fchip { font-family: var(--mono); font-size: 12px; letter-spacing: .04em; padding: 7px 13px; border: 1px solid var(--line-2); border-radius: 20px; color: var(--soft); cursor: pointer; background: transparent; }
  .fchip .c { color: var(--dim); margin-left: 5px; }
  .fchip.on { background: rgba(255,90,44,.13); border-color: var(--accent-2); color: var(--text); }
  .lrow { border: 1px solid var(--line); border-radius: 12px; background: var(--panel); margin-bottom: 10px; overflow: hidden; }
  .lrow .top { display: flex; align-items: center; gap: 14px; padding: 15px 17px; cursor: pointer; }
  .lrow .sbadge { font-family: var(--mono); font-size: 10px; font-weight: 600; letter-spacing: .06em; padding: 4px 8px; border-radius: 5px; white-space: nowrap; }
  .sbadge.saving { background: #16301f; color: #58c98a; }
  .sbadge.nocheaper { background: #23262b; color: #9aa0a6; }
  .sbadge.notfound { background: #34290f; color: #e0a53c; }
  .lrow .info { flex: 1; min-width: 0; }
  .lrow .desc { font-size: 14.5px; color: var(--text); }
  .lrow .meta { font-family: var(--mono); font-size: 11px; color: var(--dim); margin-top: 4px; }
  .lrow .prices { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
  .lrow .est { font-family: var(--mono); font-size: 13px; color: var(--dim); text-decoration: line-through; }
  .lrow .arw { color: var(--dim); }
  .lrow .best { font-family: var(--head); font-weight: 700; font-size: 17px; color: var(--text); }
  .lrow .best.cheaper { color: #58c98a; }
  .lrow .save { font-family: var(--mono); font-size: 11px; color: #58c98a; }
  .lrow .chev { color: var(--dim); font-size: 12px; }
  .lrow .exp { padding: 0 17px 15px; border-top: 1px solid var(--line); display: none; }
  .lrow.open .exp { display: block; }
  .lrow .exp .lbl { font-family: var(--mono); font-size: 10px; letter-spacing: .12em; color: var(--dim); margin: 14px 0 8px; }
  .srow { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed var(--line-2); font-size: 13px; }
  .srow:last-child { border-bottom: 0; }
  .srow .tag { font-family: var(--mono); font-size: 9.5px; color: #58c98a; border: 1px solid #2e6a45; border-radius: 4px; padding: 1px 5px; margin-left: 8px; }
  .srow .p { font-family: var(--head); font-weight: 700; }
</style>
</head>
<body>
<header class="ps-header">
  <a class="ps-brand" href="/index.html">
    <img src="/assets/logo.png?v=6" alt="Parts Sniper" onerror="this.style.display='none'">
    <span class="ps-wordmark">PARTS <span>SNIPER</span></span>
  </a>
  <nav class="ps-nav">
    <a href="/index.html">Projects</a>
    <a href="/watchlist.html">Watchlist <span class="count" id="navSaved"></span></a>
    <a href="/alerts.html">Alerts</a>
  </nav>
  <div class="ps-spacer"></div>
  <button class="btn" onclick="location.href='/index.html'"><span class="plus">＋</span> New hunt</button>
  <div class="ps-avatar">PS</div>
</header>

<main class="ps-main">
  <div class="crumb"><a href="/index.html">&#8592; All projects</a></div>
  <div class="eyebrow" id="kicker" style="margin-top:16px">// PARTS LIST HUNT</div>
  <h1 class="page" id="pName">Loading…</h1>
  <div id="body"></div>
</main>

<div class="ps-foot">PARTS SNIPER — PRECISION PART HUNTING</div>

<script>
document.addEventListener('DOMContentLoaded', async function () {
  PH.updateWatchCount();
  const id = PH.qs('id');
  const wantRun = PH.qs('run') === '1';
  const body = document.getElementById('body');
  const money = (n) => '$' + Math.round(Number(n || 0)).toLocaleString('en-AU');
  let data = null;

  async function loadData() { data = await PH.api('/api/list?id=' + encodeURIComponent(id)); }

  async function runHunt() {
    body.innerHTML = '<div class="banner"><span class="spinner"></span> Hunting the cheapest source for every part — this can take a couple of minutes. Leave this open.</div>';
    try {
      await PH.api('/api/run-list', { method: 'POST', body: { projectId: id } });
      await loadData();
      render();
    } catch (e) {
      body.innerHTML = '<div class="banner err">Hunt failed: ' + PH.esc(e.message) + '</div>';
    }
  }

  function render() {
    document.getElementById('pName').textContent = data.project.name;
    const lines = data.results || data.partsList || [];
    document.getElementById('kicker').textContent = '// PARTS LIST HUNT — ' + lines.length + ' LINES';

    if (!data.results) {
      body.innerHTML =
        '<div class="banner" style="display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap">' +
        '<span>' + (data.partsList || []).length + ' parts ready to hunt.</span>' +
        '<button class="btn" id="runBtn">Hunt all ' + (data.partsList || []).length + ' parts &#8594;</button></div>';
      document.getElementById('runBtn').addEventListener('click', runHunt);
      return;
    }

    const t = data.totals || { estTotal: 0, foundTotal: 0, saveTotal: 0 };
    const pct = t.estTotal ? Math.round(t.saveTotal / t.estTotal * 100) : 0;
    const results = data.results;
    const counts = {
      all: results.length,
      saving: results.filter((r) => r.status === 'saving').length,
      nocheaper: results.filter((r) => r.status === 'nocheaper').length,
      notfound: results.filter((r) => r.status === 'notfound').length
    };

    let html =
      '<div class="sumgrid">' +
        '<div class="sum"><div class="k">ESTIMATE TOTAL</div><div class="v">' + money(t.estTotal) + '</div></div>' +
        '<div class="sum"><div class="k">BEST-FOUND TOTAL</div><div class="v">' + money(t.foundTotal) + '</div></div>' +
        '<div class="sum save"><div class="k">POTENTIAL SAVING</div><div class="v">' + money(t.saveTotal) + '<span class="pct">-' + pct + '%</span></div></div>' +
      '</div>' +
      '<div class="fchips">' +
        chip('all', 'All', counts.all) + chip('saving', 'Savings found', counts.saving) +
        chip('nocheaper', 'OEM best price', counts.nocheaper) + chip('notfound', 'No match', counts.notfound) +
      '</div><div id="rows"></div>';
    body.innerHTML = html;

    let filter = 'all';
    function chipEls() { return body.querySelectorAll('.fchip'); }
    function drawRows() {
      const rowsEl = document.getElementById('rows');
      const shown = results.filter((r) => filter === 'all' || r.status === filter);
      rowsEl.innerHTML = shown.map(rowHtml).join('') || '<div class="banner">Nothing in this filter.</div>';
      rowsEl.querySelectorAll('.lrow .top').forEach((el) => el.addEventListener('click', () => el.parentElement.classList.toggle('open')));
    }
    chipEls().forEach((el) => el.addEventListener('click', () => {
      filter = el.dataset.f; chipEls().forEach((c) => c.classList.toggle('on', c === el)); drawRows();
    }));
    drawRows();
  }

  function chip(f, label, n) { return '<button class="fchip' + (f === 'all' ? ' on' : '') + '" data-f="' + f + '">' + label + '<span class="c">' + n + '</span></button>'; }

  function rowHtml(r) {
    const badge = r.status === 'saving' ? 'SAVING' : (r.status === 'nocheaper' ? 'OEM BEST' : 'NO MATCH');
    const meta = 'PN ' + PH.esc(r.pn || '—') + (r.qty ? '  ·  qty ' + r.qty : '') + '  ·  ' + (r.matches || 0) + ' source' + (r.matches === 1 ? '' : 's');
    let right;
    if (r.status === 'notfound') {
      right = '<span class="est">' + (r.est != null ? money(r.est) : '—') + '</span><span class="meta">no source found</span>';
    } else {
      const cheaper = r.status === 'saving';
      right = (r.est != null ? '<span class="est">' + money(r.est) + '</span><span class="arw">&#8594;</span>' : '') +
        '<span class="best' + (cheaper ? ' cheaper' : '') + '">' + money(r.found) + '</span>' +
        (cheaper ? '<span class="save">-' + money(r.saving) + '</span>' : '');
    }
    const alts = (r.alts || []).map((a) => '<div class="srow"><span>' + PH.esc(a.label) + (a.best ? '<span class="tag">BEST</span>' : '') + '</span><span class="p">' + money(a.price) + '</span></div>').join('');
    return '<div class="lrow"><div class="top">' +
      '<span class="sbadge ' + r.status + '">' + badge + '</span>' +
      '<div class="info"><div class="desc">' + PH.esc(r.desc || '') + '</div><div class="meta">' + meta + '</div></div>' +
      '<div class="prices">' + right + '</div>' +
      '<span class="chev">' + (alts ? '▾' : '') + '</span></div>' +
      (alts ? '<div class="exp"><div class="lbl">SOURCES FOUND</div>' + alts + '</div>' : '') +
      '</div>';
  }

  try {
    await loadData();
    if (wantRun && !data.results) { render(); runHunt(); }
    else render();
  } catch (e) {
    body.innerHTML = '<div class="banner err">Could not load: ' + PH.esc(e.message) + '</div>';
  }
});
</script>
</body>
</html>
